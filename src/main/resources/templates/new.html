<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Nieuw Event</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<nav class="bg-blue-700 text-white p-4 flex gap-6">

    <a href="/">NGO Anderlecht</a>

    <a href="/new">New Event</a>

    <a href="/about">About</a>

    <a href="/contact">Contact</a>

</nav>

<div class="max-w-2xl mx-auto p-8">

    <h1 class="text-4xl font-bold mb-6">
        Nieuw evenement
    </h1>

    <form th:action="@{/new}"
          th:object="${event}"
          method="post"
          class="space-y-4">

        <input
                type="text"
                th:field="*{title}"
                placeholder="Titel"
                class="w-full p-2 border rounded">

        <textarea
                th:field="*{description}"
                placeholder="Omschrijving"
                class="w-full p-2 border rounded">
        </textarea>

        <input
                type="text"
                th:field="*{organisation}"
                placeholder="Organisatie"
                class="w-full p-2 border rounded">

        <input
                type="email"
                th:field="*{contactEmail}"
                placeholder="Email"
                class="w-full p-2 border rounded">

        <input
                type="datetime-local"
                th:field="*{dateTime}"
                class="w-full p-2 border rounded">

        <button
                type="submit"
                class="bg-green-600 text-white px-4 py-2 rounded">

            Opslaan

        </button>

    </form>

</div>

<footer class="bg-gray-800 text-white p-4 text-center fixed bottom-0 w-full">

    © 2026 NGO Anderlecht

</footer>

</body>
</html>
