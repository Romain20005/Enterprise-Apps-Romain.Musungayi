<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Anderlecht Community NGO</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<nav class="bg-blue-700 text-white p-4 flex gap-6">

    <a href="/">NGO Anderlecht</a>

    <a href="/new">New Event</a>

    <a href="/about">About</a>

    <a href="/contact">Contact</a>

</nav>

<div class="p-8">

    <h1 class="text-4xl font-bold mb-4">
        Welkom bij onze NGO
    </h1>
    <table class="table-auto border w-full bg-white">

        <tr class="bg-gray-200">
            <th class="border p-2">Titel</th>
            <th class="border p-2">Organisatie</th>
        </tr>

        <tr th:each="event : ${events}">
            <td class="border p-2"
                th:text="${event.title}">
            </td>

            <td class="border p-2"
                th:text="${event.organisation}">
            </td>
        </tr>

    </table>

    <div class="mt-4">

        <a href="/new"
           class="bg-green-600 text-white px-4 py-2 rounded">

            Nieuw evenement

        </a>

    </div>

</div>

<footer class="bg-gray-800 text-white p-4 text-center fixed bottom-0 w-full">

    © 2026 NGO Anderlecht

</footer>

</body>
</html>
