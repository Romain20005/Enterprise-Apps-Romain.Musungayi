<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Event Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<nav class="bg-blue-700 text-white p-4 flex gap-6">
    <a href="/">NGO Anderlecht</a>
    <a href="/new">New Event</a>
    <a href="/about">About</a>
    <a href="/contact">Contact</a>
</nav>

<div class="max-w-4xl mx-auto p-8">

    <h1 class="text-4xl font-bold mb-6"
        th:text="${event.title}">
    </h1>

    <p><strong>Omschrijving:</strong>
        <span th:text="${event.description}"></span>
    </p>

    <p><strong>Organisatie:</strong>
        <span th:text="${event.organisation}"></span>
    </p>

    <p><strong>Email:</strong>
        <span th:text="${event.contactEmail}"></span>
    </p>

</div>

<footer class="bg-gray-800 text-white p-4 text-center fixed bottom-0 w-full">
    © 2026 NGO Anderlecht
</footer>

</body>
</html>
